# ====================================================================
# 🏠 BSARC HOMEPAGE DATA SHEET - SITE MAINTENANCE CONFIGURATION
# ====================================================================
# INSTRUCTIONS FOR EDITORS AND CLUB OFFICERS:
# 
# 💡 General Formatting Rules:
#    - Text values MUST be wrapped in double quotation marks: "your text here"
#    - Boolean switches MUST be written in lowercase: true or false
# 
# 📦 Blocks Type Legend:
#    - Single Brackets [like_this]: Settings that appear exactly ONCE on the site.
#    - Double Brackets [[like_this]]: Lists of items. You can copy/paste a whole 
#                                    block to add another line item to the site!
# ====================================================================


# ====================================================================
# 🖼️ SEASONAL HEADER BANNER
# ====================================================================
[banner]

#image = "/images/club_banner_spring.webp"
image = "/images/club_banner_summer.webp"
#image = "/images/club_banner_fall.webp"
#image = "/images/club_banner_winter.webp"
alt = "Brunswick Shores ARC Banner"


# ====================================================================
# 📝 WELCOME TEXT INLINE CONTENT
# ====================================================================
[welcome]
heading = "Welcome to N4GM"
subheading = "Brunswick Shores Amateur Radio Club"
text = "Welcome to the digital home of the Brunswick Shores Amateur Radio Club (BSARC). We serve the amateur radio community in southeastern North Carolina, supporting emergency communications (ARES/RACES) and promoting the hobby through community events, testing, and regular nets."
last_updated = "February 25, 2026"


# ====================================================================
# 🎙️ ROUTINE CLUB NET SCHEDULES
# ====================================================================
# To add a net, copy from [[nets]] to the end of the time field and paste below.
[[nets]]
name = "The Shrimp NET (KI4KK)"
freq = "147.315 MHz (+600 kHz, T 118.8)"
time = "Mondays @ 8:30 AM"

[[nets]]
name = "AUXCOM / ARES NET"
freq = "147.315 MHz (+600 kHz, T 118.8)"
time = "Mondays @ 7:00 PM"

[[nets]]
name = "Local Ragchew"
freq = "147.315 MHz (Simplex / Repeater)"
time = "Daily Echo"


# ====================================================================
# 🏛️ CLUB MEETING LOCATION DETAILS
# ====================================================================
[meetings.monthly]
text = "Meetings are held on the second Wednesday of each month from 6:00 PM to 8:00 PM. The location alternates monthly between Calabash and Supply. Meetings are also normally broadcasted via ZOOM (links are sent directly to members and guests)."

# These alternate locations dynamically map to the tables based on listed months
[[meetings.locations]]
months = "Feb, Apr, Jun, Aug, Oct, Dec"
name = "Calabash EMS Building"
address = "9031 Beach Drive SW, Calabash, NC 28467"

[[meetings.locations]]
months = "Jan, Mar, May, Jul, Sep, Nov"
name = "BEMC Headquarters"
address = "795 Ocean Hwy, Supply, NC 28462"

[meetings.breakfast]
text = "A group of local hams meets every Wednesday morning at 8:15 AM at the Tee Time Cafe in Shallotte (126 Holden Beach Road). Club business is often informally discussed, and all are welcome!"


