<table style="width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px;">
  <thead>
    <tr style="background-color: #f5f5f5; border-bottom: 2px solid #e0e0e0; text-align: left;">
      <th style="padding: 10px;">Frequency</th>
      <th style="padding: 10px;">Offset</th>
      <th style="padding: 10px;">Tone / Code</th>
      <th style="padding: 10px;">Location</th>
      <th style="padding: 10px;">Operational Notes</th>
    </tr>
  </thead>
  <tbody>
    {{ range .Site.Data.homepage.repeaters }}
    <tr style="border-bottom: 1px solid #eeeeee;">
      <td style="padding: 10px; font-weight: bold; color: #1e4620;">{{ .frequency }}</td>
      <td style="padding: 10px; color: #555555;">{{ .offset }}</td>
      <td style="padding: 10px; color: #555555;">{{ .tone }}</td>
      <td style="padding: 10px; font-weight: 500;">{{ .location }}</td>
      <td style="padding: 10px; font-style: italic; color: #666666;">{{ .notes }}</td>
    </tr>
    {{ end }}
  </tbody>
</table>
