<a href="{{ if strings.HasPrefix .Destination "http" }}{{ .Destination | safeURL }}{{ else }}{{ .Destination | relURL }}{{ end }}"
  {{ with .Title }} title="{{ . }}" {{ end }}
  {{ if strings.HasPrefix .Destination "http" }}
    target="_blank" rel="noopener noreferrer"
  {{ end }}>
  {{ .Text | safeHTML }}
</a>
